---
layout: default
---
<div class="posts">
  {% for post in site.categories.project %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
      
      <h2>{{ post.date | date: '%B %Y' }}</h2>

      <div class="entry">
        {{ post.content }}
      </div>

    </article>
  {% endfor %}
</div>
